<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rock Paper Scissors(Dom)</title>
    <link rel="stylesheet" href="rcp.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="buttons">
    <button

      class="move-btn"
      onclick=" playGame('rock'); " 
      ><img class="move-img" src="images\rock-emoji.png" alt="rock">
    
  </button>

    <button

      class="move-btn"
       onclick=" playGame('paper');" 
       
       ><img class="move-img" src="images\paper-emoji.png" alt="paper">
    
    </button>
   
    <button
     class="move-btn"
      onclick=" playGame('scissor'); "
       ><img class="move-img" src="images\scissor-emoji.png" alt="scissors">
      
    </button>
    </div>

  <p class="js-result result"></p>
  <p class="js-moves moves"></p>
  <p class="js-score score"></p>
    <button 
      class="reset-score-btn"
       onclick="
       score.wins = 0;
       score.losses = 0;
       score.ties = 0;
       localStorage.removeItem('score');
        updateScore();
    ">Reset Score</button>

    <script src="rcp.js">
        
    </script>
</body>
</html>
